identifier: org.fedimint.mobile
name: Fedimint
summary: A federated ecash mint on your phone with QR-based setup, guardian management, and easy backups.
description: |
  Fedimint Mobile allows you to run a Fedimint Guardian node directly on an Android phone. Easily backup
  and restore your guardian using the built-in backup feature. It is recommended to run this on a phone
  that has constant and reliable internet and power access.

  Features:
  - Easy setup with QR Codes
  - Reliable backup and recovery
  - Built in Federation UI for managing and monitoring your federation
repository: https://github.com/m1sterc001guy/fedimintd-mobile
